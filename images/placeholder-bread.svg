<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdf9ed"/>
      <stop offset="100%" stop-color="#f0e4c8"/>
    </linearGradient>
    <linearGradient id="bread" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c08a"/>
      <stop offset="100%" stop-color="#b87a3d"/>
    </linearGradient>
    <linearGradient id="tray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5a2b"/>
      <stop offset="100%" stop-color="#5c3a1e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="280" fill="url(#bg)"/>
  <!-- bamboo weave hint -->
  <g opacity="0.07" stroke="#8b5a2b" stroke-width="1">
    <line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
  </g>
  <!-- wooden tray -->
  <ellipse cx="200" cy="220" rx="160" ry="22" fill="url(#tray)"/>
  <ellipse cx="200" cy="215" rx="155" ry="18" fill="#a86a3d"/>
  <!-- bread loaves -->
  <ellipse cx="140" cy="195" rx="40" ry="28" fill="url(#bread)"/>
  <ellipse cx="135" cy="188" rx="20" ry="6" fill="#fff" opacity="0.18"/>
  <ellipse cx="200" cy="190" rx="45" ry="32" fill="url(#bread)"/>
  <ellipse cx="195" cy="181" rx="22" ry="7" fill="#fff" opacity="0.18"/>
  <ellipse cx="265" cy="198" rx="38" ry="26" fill="url(#bread)"/>
  <ellipse cx="261" cy="190" rx="18" ry="6" fill="#fff" opacity="0.18"/>
  <!-- breadcrumbs -->
  <circle cx="100" cy="225" r="2" fill="#8b5a2b" opacity="0.4"/>
  <circle cx="115" cy="230" r="1.5" fill="#8b5a2b" opacity="0.4"/>
  <circle cx="305" cy="227" r="2" fill="#8b5a2b" opacity="0.4"/>
  <circle cx="290" cy="232" r="1.5" fill="#8b5a2b" opacity="0.4"/>
  <!-- placeholder label -->
  <text x="200" y="55" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#8b5a2b" opacity="0.55" font-style="italic">— placeholder photo —</text>
</svg>
